name: eval-gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Lint
        run: ruff check src tests
      - name: Unit tests
        run: pytest -q
      # Phase 4: gate merges on eval metrics.
      # The harness exits non-zero if faithfulness / citation accuracy
      # fall below the thresholds in config/config.yaml.
      - name: Eval gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m targetscout.eval.harness --ci
