services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: targetscout
      POSTGRES_PASSWORD: targetscout
      POSTGRES_DB: targetscout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file: .env
    depends_on: [db]
    ports:
      - "8000:8000"
    command: uvicorn targetscout.api.main:app --host 0.0.0.0 --port 8000

volumes:
  pgdata:
