# TargetScout configuration

models:
  protein_embedder: facebook/esm2_t33_650M_UR50D
  molecule_embedder: DeepChem/ChemBERTa-77M-MLM
  biomedical_embedder: pritamdeka/S-PubMedBert-MS-MARCO
  reranker: cross-encoder/ms-marco-MiniLM-L-6-v2
  ner_model: d4data/biomedical-ner-all
  synthesis_llm: claude-sonnet-5        # frontier model, final report only
  extraction_llm: open-weight           # cheap model for extraction/routing

admet:
  # TDC benchmark-group dataset names
  endpoints: [hERG, DILI, Solubility_AqSolDB, Lipophilicity_AstraZeneca, BBB_Martins, Clearance_Hepatocyte_AZ]
  featurizer: rdkit_plus_chemberta
  algo: lightgbm

rag:
  chunk_size: 512
  chunk_overlap: 64
  top_k: 20
  rerank_k: 5

eval:
  thresholds:            # CI gate fails below these
    faithfulness: 0.85
    citation_accuracy: 0.80
    retrospective_roc_auc: 0.70
